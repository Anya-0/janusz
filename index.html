<style>
  :root{
    --forest:#0A1F16; --forest-80:#1B3328; --forest-60:#3D554A;
    --mint:#D5EFC0; --mint-deep:#B9DFA0;
    --bone:#F7F5F1; --n-200:#DCE0D6;
    --font-sans:"Geist","DM Sans",ui-sans-serif,system-ui,-apple-system,sans-serif;
    --font-display:"Geist","DM Sans",ui-sans-serif,system-ui,sans-serif;
    --font-mono:"Geist Mono",ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--forest);color:var(--forest);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
  body{min-height:100dvh;min-height:100vh}

  .shell{max-width:460px;margin:0 auto;background:var(--bone);min-height:100dvh;min-height:100vh;display:flex;flex-direction:column}

  /* Forest top card */
  .top{background:var(--forest);color:#fff;padding:calc(env(safe-area-inset-top) + 28px) 28px 36px}
  .top .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.7;display:flex;justify-content:space-between;align-items:center}
  .top .eyebrow .dot{width:7px;height:7px;border-radius:999px;background:var(--mint-deep);display:inline-block;margin-right:6px;vertical-align:middle}
  .top h1{font-family:var(--font-display);font-weight:500;font-size:54px;line-height:0.95;letter-spacing:-0.045em;margin:32px 0 10px}
  .top h1 .pt{color:var(--mint-deep)}
  .top .role{font-size:16px;line-height:1.4;opacity:0.85;margin:0;max-width:26ch}

  /* Primary CTA: save contact */
  .save-cta{
    margin:24px 0 0;
    display:flex;align-items:center;justify-content:center;gap:10px;
    background:var(--mint);color:var(--forest);
    padding:18px 22px;
    font-family:var(--font-mono);font-size:13px;letter-spacing:0.14em;text-transform:uppercase;font-weight:500;
    border:0;border-radius:999px;cursor:pointer;
    width:100%;text-decoration:none;
  }
  .save-cta:active{background:var(--mint-deep)}
  .save-cta svg{flex-shrink:0}

  /* Body sections */
  .sect{padding:28px 28px 0}
  .sect + .sect{padding-top:32px}
  .sect-eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.5;margin-bottom:14px}

  .link-row{display:flex;align-items:center;justify-content:space-between;padding:18px 0;border-top:1px solid var(--n-200);font-size:16px;text-decoration:none;color:var(--forest)}
  .link-row:last-child{border-bottom:1px solid var(--n-200)}
  .link-row .k{font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.55;display:block;margin-bottom:4px}
  .link-row .v{font-size:17px;letter-spacing:-0.01em;word-break:break-all}
  .link-row .arrow{flex-shrink:0;margin-left:16px;opacity:0.4}
  .link-row:active{background:rgba(10,31,22,0.03)}

  /* Brief */
  .brief{background:var(--mint);color:var(--forest);padding:32px 28px;margin-top:36px}
  .brief .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.55;margin-bottom:14px}
  .brief h2{font-family:var(--font-display);font-weight:400;font-size:28px;line-height:1.15;letter-spacing:-0.03em;margin:0;max-width:22ch}
  .brief h2 .pt{color:var(--forest);font-weight:500}

  /* Specs */
  .specs{display:grid;grid-template-columns:repeat(3,1fr);background:var(--forest);color:#fff;padding:28px;gap:4px}
  .spec{padding:4px 8px 4px 0}
  .spec + .spec{border-left:1px solid rgba(255,255,255,0.18);padding-left:16px}
  .spec .k{font-family:var(--font-mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.6;display:block;margin-bottom:8px}
  .spec .v{font-family:var(--font-display);font-weight:500;font-size:28px;line-height:1;letter-spacing:-0.04em}
  .spec .unit{font-family:var(--font-sans);font-size:12px;opacity:0.6;letter-spacing:0;margin-left:2px;font-weight:400}

  /* Foot */
  .foot{padding:28px 28px calc(env(safe-area-inset-bottom) + 40px);background:var(--forest);color:#fff}
  .foot .partners{font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.55;line-height:1.8}
  .foot .cta-web{display:block;margin-top:18px;padding:16px 20px;border:1px solid rgba(255,255,255,0.25);color:#fff;text-decoration:none;text-align:center;font-family:var(--font-mono);font-size:12px;letter-spacing:0.14em;text-transform:uppercase;border-radius:999px}
  .foot .cta-web:active{background:rgba(255,255,255,0.08)}
  .foot .meta{margin-top:24px;display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.5}

  /* Toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(140%);background:var(--forest);color:var(--mint);padding:14px 20px;border-radius:999px;font-family:var(--font-mono);font-size:12px;letter-spacing:0.1em;text-transform:uppercase;transition:transform .35s cubic-bezier(.2,.8,.2,1);z-index:100}
  .toast.show{transform:translateX(-50%) translateY(0)}

  .top .eyebrow .brand{display:inline-flex;align-items:center}
  .top .eyebrow .brand .ohome-logo{height:40px;width:auto;display:block}
</style>
</head>
<body>

<div class="shell">

  <!-- Forest header -->

    <div class="eyebrow">

      <span>oho.me</span>
    </div>
    <h1>L. Janusz<br/>Hooker<span class="pt">.</span></h1>
    <p class="role">Founder, OHOME · LJ Hooker Group</p>

    <a href="#" id="saveBtn" class="save-cta">

  <!-- Contact rows -->

    </div>

</div>

<div class="toast" id="toast">Contact downloaded</div>

<script>
  // vCard — downloaded when user taps "Save to contacts"
  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'N:Hooker;Janusz;L.;;',
    'FN:L. Janusz Hooker',
    'ORG:OHOME;LJ Hooker Group',
    'TITLE:Founder',
    'EMAIL;TYPE=INTERNET,WORK:LJ@OHO.ME',
    'URL:https://www.oho.me',
    'NOTE:Founder of OHOME — factory-built modular homes. Order to keys in 100 days.',
    'END:VCARD'
  ].join('\r\n');

  document.getElementById('saveBtn').addEventListener('click', (e) => {
    e.preventDefault();
    const blob = new Blob([vcard], {type:'text/vcard;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'L-Janusz-Hooker.vcf';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 500);

    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  });
</script>

</body>
